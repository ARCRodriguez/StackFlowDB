<div class="page-header">
    <div class="page-title" id="page-title">Mis Tareas</div>

  <div class="legend">

    <div class="legend-item"><span class="sdot en_proceso"></span>En Proceso</div>
    <div class="legend-item"><span class="sdot en_validacion"></span>En Validación</div>
    <div class="legend-item"><span class="sdot completado"></span>Completado</div>

      <span class="legend-box por_vencer"></span>No iniciada — Por Vencer

    <div class="legend-item">

    </div>
    <div class="legend-item">
      <img src="advertencia_media.png" class="legend-img" alt="obs media"/>Obs. media
    </div>
    <div class="legend-item">
      <img src="advertencia_alta.png" class="legend-img" alt="obs importante"/>Obs. importante
    </div>
  </div>

  <div class="filter-bar">
    <span class="filter-label">Filtrar:</span>

      <option value="">Todos los estados</option>
      <option value="asignado">Asignado</option>
      <option value="en_proceso">En Proceso</option>
      <option value="en_validacion">En Validación</option>

      <option value="vencido">Vencido</option>
      <option value="completado">Completado</option>

    <select id="f-tipo" onchange="renderTable()">

<div class="detail-overlay" id="detail-overlay" onclick="closeDetail(event)">

  </div>
</main>

<script src="db.js"></script>
<script src="tareas_api.js"></script>
<script src="zidkenu_shell.js"></script>
<script>
let session = null;
let uploadedFile = null;
const ORDEN_TIPO = ['mensual','general','anual'];
const TIPO_COLOR = {mensual:'#7c3aed',general:'#d97706',anual:'var(--blue1)'};
const TIPO_LABEL = {mensual:'Mensuales',general:'Generales / Esporádicas',anual:'Anuales'};

document.addEventListener('DOMContentLoaded', async () => {
  await DB.ready;
  session = DB.requireSession(['contador']);
  if (!session) return;
  const nameEl = document.getElementById('sidebarName');
  if (nameEl) nameEl.textContent = session.nombre;
  document.getElementById('page-title').textContent = 'Mis Tareas — ' + session.nombre;
  renderTable();
});

/* ══ HELPERS ══ */
function fmtFecha(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('es-PE',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function fmtFechaHora(iso){
  if(!iso) return null;
  const d = new Date(iso);
  return d.toLocaleDateString('es-PE',{day:'2-digit',month:'2-digit',year:'numeric'})
    +' '+d.toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'});
}
function fechaLimClass(l){
  if(!l) return '';
  const now=new Date(); now.setHours(0,0,0,0);
  const lim=new Date(l+'T00:00:00');
  if(lim<now) return 'vencida';
  if((lim-now)/86400000<=7) return 'vence-pronto';
  return '';
}
function getEstadoVisual(tarea){
  if(tarea.estado==='completado')    return 'completado';
  if(tarea.estado==='en_validacion') return 'en_validacion';
  if(tarea.estado==='en_proceso')    return 'en_proceso';
  if(tarea.fecha_limite){
    const now=new Date(); now.setHours(0,0,0,0);
    const lim=new Date(tarea.fecha_limite+'T00:00:00');
    if(lim<now)               return 'vencido_no_iniciado';
    if((lim-now)/86400000<=7) return 'porvencer_no_iniciado';
  }
  return 'asignado';
}
function estadoCirculo(ev){
  if(ev==='completado')    return 'completado';
  if(ev==='en_validacion') return 'en_validacion';
  if(ev==='en_proceso')    return 'en_proceso';
  return 'asignado';
}

/* ══ RENDER TABLE ══ */
function renderTable(){
  const fEstado = document.getElementById('f-estado').value;
  const fTipo   = document.getElementById('f-tipo').value;

  const asigs = DB.getAsignaciones().filter(a =>
    a.activa && a.contador_id === session.id
  );

  const table = document.getElementById('main-table');
  table.innerHTML = '';

  if(!asigs.length){
    table.innerHTML='<tr><td class="empty-table" colspan="99">No tienes empresas asignadas aún.</td></tr>';
    return;
  }

  const taskNames={mensual:[],general:[],anual:[]};
  asigs.forEach(a=>{
    DB.getTareasByAsignacion(a.id).forEach(t=>{
      if(!taskNames[t.tipo]) return;
      if(!taskNames[t.tipo].includes(t.nombre)) taskNames[t.tipo].push(t.nombre);
    });
  });

  const tiposActivos = fTipo
    ? ORDEN_TIPO.filter(t=>t===fTipo && taskNames[t].length)
    : ORDEN_TIPO.filter(t=>taskNames[t].length);

  // THEAD
  const thead=document.createElement('thead');
  const trG=document.createElement('tr');
  const mkTh=(txt,cls,cs,rs,style)=>{
    const th=document.createElement('th');
    th.className=cls; th.colSpan=cs||1; th.rowSpan=rs||1;
    th.textContent=txt; if(style) th.style.cssText=style;
    return th;
  };
  trG.appendChild(mkTh('Empresa','th-fix th-empresa',1,2));
  trG.appendChild(mkTh('Tipo',   'th-fix th-tipo',   1,2));
  tiposActivos.forEach(tipo=>{
    if(!taskNames[tipo].length) return;
    const th=document.createElement('th');
    th.colSpan=taskNames[tipo].length;
    th.style.cssText=`background:var(--gray50);padding:7px 8px;font-size:11px;
      font-weight:700;text-align:center;color:${TIPO_COLOR[tipo]};
      border-left:3px solid ${TIPO_COLOR[tipo]};letter-spacing:.3px;`;
    th.textContent='— '+TIPO_LABEL[tipo]+' —';
    trG.appendChild(th);
  });
  trG.appendChild(mkTh('Fecha Límite','th-flimite',1,2));
  thead.appendChild(trG);

  const trN=document.createElement('tr');
  tiposActivos.forEach(tipo=>{
    taskNames[tipo].forEach((nombre,ni)=>{
      const th=document.createElement('th');
      th.className='th-tarea-name '+tipo;
      th.textContent=nombre;
      if(ni===0) th.style.borderLeft=`3px solid ${TIPO_COLOR[tipo]}`;
      trN.appendChild(th);
    });
  });
  thead.appendChild(trN);
  table.appendChild(thead);

  // TBODY
  const tbody=document.createElement('tbody');

  asigs.forEach(a=>{
    const emp=DB.getEmpresa(a.empresa_id);
    if(!emp) return;
    const todasTareas=DB.getTareasByAsignacion(a.id);

    const seccionesPresentes=tiposActivos.filter(t=>
      todasTareas.some(ta=>ta.tipo===t)
    );
    if(!seccionesPresentes.length) return;

    let seccionesRender=seccionesPresentes;
    if(fEstado){
      seccionesRender=seccionesPresentes.filter(t=>
        todasTareas.filter(ta=>ta.tipo===t).some(ta=>{
          const ev=getEstadoVisual(ta);
          if(fEstado==='por_vencer') return ev==='porvencer_no_iniciado';
          if(fEstado==='vencido')    return ev==='vencido_no_iniciado';
          return ev===fEstado;
        })
      );
      if(!seccionesRender.length) return;
    }

    seccionesRender.forEach((tipo,si)=>{
      const tr=document.createElement('tr');

      // Empresa rowspan
      if(si===0){
        const td=document.createElement('td');
        td.className='td-empresa'; td.rowSpan=seccionesRender.length;
        const cc=emp.complejidad==='Alta'?'alta':emp.complejidad==='Media'?'media':'baja';
        td.innerHTML=`<div class="emp-cell">
          <span class="cdot cdot-${cc}"></span>
          <div><div class="emp-name">${emp.nombre}</div>
          <div class="emp-comp">${emp.complejidad}</div></div>
        </div>`;
        tr.appendChild(td);
      }

      // Tipo + progreso
      const tareasDeEste=todasTareas.filter(t=>t.tipo===tipo);
      const total=tareasDeEste.length;
      const completadas=tareasDeEste.filter(t=>t.estado==='completado').length;
      const pct=total?Math.round((completadas/total)*100):0;
      const progColors={mensual:'#7c3aed',general:'#d97706',anual:'var(--blue1)'};
      const tipoLabels={mensual:'Mensual',general:'General',anual:'Anual'};

      const tdTipo=document.createElement('td');
      tdTipo.className='td-tipo';
      tdTipo.style.borderLeft=`3px solid ${TIPO_COLOR[tipo]}`;
      tdTipo.innerHTML=`
        <div style="display:flex;flex-direction:column;gap:3px;align-items:flex-start;">
          <span class="tipo-tag ${tipo}">${tipoLabels[tipo]}</span>
          <div style="width:100%;min-width:72px;">
            <div class="prog-bar">
              <div class="prog-fill ${tipo}" style="width:${pct}%"></div>
            </div>
            <div class="prog-label">${completadas}/${total} (${pct}%)</div>
          </div>
        </div>`;
      tr.appendChild(tdTipo);

      // Celdas de tareas
      tiposActivos.forEach(tipoCol=>{
        if(!taskNames[tipoCol].length) return;
        taskNames[tipoCol].forEach((nombre,ni)=>{
          const tdT=document.createElement('td');
          tdT.className='td-task';
          if(ni===0) tdT.style.borderLeft=`3px solid ${TIPO_COLOR[tipoCol]}`;

          if(tipoCol!==tipo){
            tdT.className+=' td-empty';
            tdT.innerHTML='<span style="color:var(--gray200)">—</span>';
            tr.appendChild(tdT); return;
          }

          const tarea=tareasDeEste.find(t=>t.nombre===nombre);
          if(!tarea){
            tdT.className+=' td-empty';
            tdT.innerHTML='<span style="color:var(--gray200)">—</span>';
            tr.appendChild(tdT); return;
          }

          const ev=getEstadoVisual(tarea);

          if(ev==='porvencer_no_iniciado') tdT.classList.add('bg-porvencer');
          if(ev==='vencido_no_iniciado')   tdT.classList.add('bg-vencido');

          if(fEstado){
            const match=
              (fEstado==='por_vencer'&&ev==='porvencer_no_iniciado')||
              (fEstado==='vencido'   &&ev==='vencido_no_iniciado')  ||
              (fEstado===ev);
            if(!match){
              tdT.className+=' td-empty';
              tdT.innerHTML='<span style="color:var(--gray200)">—</span>';
              tr.appendChild(tdT); return;
            }
          }

          tdT.onclick=()=>openDetail(tarea.id);

          tdT.innerHTML = DB.buildTaskCellHtml(tarea);
          tr.appendChild(tdT);
        });
      });

      // Fecha límite rowspan
      if(si===0){
        const tdF=document.createElement('td');
        tdF.className='td-flimite'; tdF.rowSpan=seccionesRender.length;
        tdF.innerHTML=`<span class="fecha-lim ${fechaLimClass(a.fecha_limite)}">
          ${fmtFecha(a.fecha_limite)}</span>`;
        tr.appendChild(tdF);
      }
      tbody.appendChild(tr);
    });
  });

  if(!tbody.hasChildNodes()){
    const tr=document.createElement('tr');
    tr.innerHTML='<td class="empty-table" colspan="99">Sin tareas para los filtros seleccionados.</td>';
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
}

/* ══ DETAIL PANEL ══ */
function openDetail(tareaId){
  const tarea=DB.getTareaAsignada(tareaId);
  if(!tarea) return;
  const emp=DB.getEmpresa(tarea.empresa_id);
  const ev=getEstadoVisual(tarea);
  const comentarios=DB.getComentariosByTarea(tareaId);
  uploadedFile=null;

  document.getElementById('dp-title').textContent=tarea.nombre;

  const estadoLabels={
    asignado:'Asignado',en_proceso:'En Proceso',en_validacion:'En Validación',
    completado:'Completado',porvencer_no_iniciado:'Por Vencer (no iniciada)',
    vencido_no_iniciado:'Vencida (no iniciada)'
  };
  const pend=v=>v
    ?`<span class="drow-value">${v}</span>`
    :`<span class="drow-value pending">Pendiente</span>`;

  const obsComentarios=comentarios.filter(c=>
    c.tipo==='observacion_alta'||c.tipo==='observacion_media'
  );
  const ultimaObs=obsComentarios.length?obsComentarios[obsComentarios.length-1]:null;

  const evBadge=ev.includes('_no_')?ev.split('_no_')[0]:ev;

  let body=`
  <div class="dsec">
    <div class="dsec-title">Estado actual</div>
    <span class="estado-badge eb-${evBadge}">
      <span class="sdot ${estadoCirculo(ev)}"></span>
      ${estadoLabels[ev]||ev}
    </span>
  </div>`;

  // Observación pendiente
  if(ultimaObs&&tarea.prioridad_observacion){
    body+=`<div class="obs-banner ${tarea.prioridad_observacion}">
      <img src="advertencia_${tarea.prioridad_observacion}.png"
        style="width:22px;height:22px;object-fit:contain;flex-shrink:0;margin-top:1px;" alt="obs"/>
      <div>
        <div style="font-weight:700;margin-bottom:3px;">
          ${tarea.prioridad_observacion==='alta'?'Observación importante':'Observación media'}
        </div>
        <div>${ultimaObs.texto}</div>
      </div>
    </div>`;
  }

  body+=`
  <div class="dsec">
    <div class="dsec-title">Información</div>
    <div class="drow"><span class="drow-label">Empresa</span>
      <span class="drow-value">${emp?.nombre||'—'}</span></div>
    <div class="drow"><span class="drow-label">Tipo</span>
      <span class="drow-value">${tarea.tipo==='mensual'?'Mensual':tarea.tipo==='anual'?'Anual':'General'}</span></div>
    ${tarea.descripcion?`<div style="margin-top:8px;">
      <div style="font-size:11px;font-weight:600;color:var(--gray500);
        margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;">Descripción</div>
      <div class="desc-box">${tarea.descripcion}</div></div>`:''}
  </div>

  <div class="dsec">
    <div class="dsec-title">Registro de fechas</div>
    <div class="drow"><span class="drow-label">Fecha límite</span>
      <span class="drow-value">${fmtFecha(tarea.fecha_limite)}</span></div>
    <div class="drow"><span class="drow-label">Asignada el</span>
      <span class="drow-value">${fmtFechaHora(tarea.fecha_asignacion)||'—'}</span></div>
    <div class="drow"><span class="drow-label">Iniciada el</span>
      ${pend(fmtFechaHora(tarea.fecha_inicio))}</div>
    <div class="drow"><span class="drow-label">Validación solicitada</span>
      ${pend(fmtFechaHora(tarea.fecha_validacion_solicitada))}</div>
    <div class="drow"><span class="drow-label">Completada el</span>
      ${pend(fmtFechaHora(tarea.fecha_completado))}</div>
  </div>`;

  // Comentarios previos
  const comsPrevios=comentarios.filter(c=>c.tipo==='comentario'||c.tipo==='documento');
  if(comsPrevios.length){
    body+=`<div class="dsec"><div class="dsec-title">Evidencias y comentarios enviados</div>
      <div style="display:flex;flex-direction:column;gap:6px;">`;
    comsPrevios.forEach(c=>{
      body+=`<div class="comment-item">
        <div>${c.texto}</div>
        ${c.archivo_nombre?`<div style="margin-top:5px;font-size:12px;color:var(--blue1)">📎 ${c.archivo_nombre}</div>`:''}
        <div class="comment-meta">${fmtFechaHora(c.fecha)}</div>
      </div>`;
    });
    body+='</div></div>';
  }

  // Observaciones del supervisor
  if(obsComentarios.length){
    body+=`<div class="dsec"><div class="dsec-title">Observaciones del supervisor</div>
      <div style="display:flex;flex-direction:column;gap:6px;">`;
    obsComentarios.forEach(c=>{
      body+=`<div class="comment-item ${c.tipo}">
        <div style="display:flex;align-items:flex-start;gap:8px;">
          <img src="advertencia_${c.tipo==='observacion_alta'?'alta':'media'}.png"
            style="width:18px;height:18px;object-fit:contain;flex-shrink:0;margin-top:2px;" alt="obs"/>
          <div>${c.texto}</div>
        </div>
        <div class="comment-meta">${fmtFechaHora(c.fecha)} ·
          ${c.tipo==='observacion_alta'
            ?'<strong style="color:#dc2626">Importante</strong>'
            :'<strong style="color:#d97706">Media</strong>'}
        </div>
      </div>`;
    });
    body+='</div></div>';
  }

  // ACCIONES
  body+=`<div class="dsec"><div class="dsec-title">Acciones</div>`;

  if(tarea.estado==='completado'){
    body+=`<button class="btn-action btn-bloqueado" disabled>✓ Tarea completada</button>`;

  } else if(tarea.estado==='en_validacion'){
    body+=`<div class="validar-pending">
      ⏳ Esperando validación del supervisor. El botón se habilitará una vez validada.
    </div>`;

  } else {
    // Subir evidencia
    body+=`
    <div class="action-box" style="margin-bottom:12px;">
      <div class="action-box-title">Agregar evidencia o comentario</div>
      <div class="upload-area" onclick="document.getElementById('file-inp-${tareaId}').click()">
        <input type="file" id="file-inp-${tareaId}"
          onchange="onFileSelect(event,'${tareaId}')"/>
        <div class="upload-label">📎 <span>Selecciona un archivo</span> o arrastra aquí</div>
        <div id="file-preview-${tareaId}" style="margin-top:6px;"></div>
      </div>
      <textarea class="comment-textarea" id="comment-txt-${tareaId}"
        placeholder="Escribe un comentario o descripción de la evidencia..."></textarea>
      <div style="display:flex;justify-content:flex-end;margin-top:8px;">
        <button class="btn-send-comment"
          onclick="enviarComentario('${tareaId}')">Enviar</button>
      </div>
    </div>`;

    if(tarea.estado==='asignado'||ev==='porvencer_no_iniciado'||ev==='vencido_no_iniciado'){
      body+=`<button class="btn-action btn-iniciar"
        onclick="accionTarea('${tareaId}','iniciar')">▶ Iniciar tarea</button>`;
    } else {
      body+=`<button class="btn-action btn-validar"
        onclick="accionTarea('${tareaId}','validar')" style="margin-top:10px;">
        ✓ Enviar a validación
      </button>
      <div style="font-size:11px;color:var(--gray500);text-align:center;margin-top:6px;">
        El supervisor revisará y aprobará la tarea.
      </div>`;
    }
  }

  body+='</div>';
  document.getElementById('dp-body').innerHTML=body;
  document.getElementById('detail-overlay').classList.add('show');
}

/* ══ ACCIONES ══ */
function accionTarea(tareaId,accion){
  if(accion==='iniciar')       DB.iniciarTarea(tareaId);
  else if(accion==='validar')  DB.solicitarValidacion(tareaId);
  closeDetailPanel(); renderTable();
}

function onFileSelect(event,tareaId){
  const file=event.target.files[0];
  if(!file) return;
  uploadedFile=file;
  const prev=document.getElementById('file-preview-'+tareaId);
  if(prev) prev.innerHTML=`<div class="uploaded-file">
    📎 <span>${file.name}</span>
    <span class="uploaded-file-del" onclick="clearFile('${tareaId}')">✕</span>
  </div>`;
}
function clearFile(tareaId){
  uploadedFile=null;
  const inp=document.getElementById('file-inp-'+tareaId);
  if(inp) inp.value='';
  const prev=document.getElementById('file-preview-'+tareaId);
  if(prev) prev.innerHTML='';
}
function enviarComentario(tareaId){
  const txt=document.getElementById('comment-txt-'+tareaId)?.value.trim();
  if(!txt&&!uploadedFile){ alert('Escribe un comentario o selecciona un archivo.'); return; }
  DB.addComentario({
    tarea_id:tareaId, autor_id:session.id, rol_autor:'contador',
    tipo:uploadedFile?'documento':'comentario',
    texto:txt||(uploadedFile?'Archivo adjunto: '+uploadedFile.name:''),
    archivo_nombre:uploadedFile?.name||null,
  });
  uploadedFile=null;
  closeDetailPanel();
  openDetail(tareaId);
}

function closeDetailPanel(){
  document.getElementById('detail-overlay').classList.remove('show');
  uploadedFile=null;
}
function closeDetail(e){
  if(e.target===document.getElementById('detail-overlay')) closeDetailPanel();
}
</script>
