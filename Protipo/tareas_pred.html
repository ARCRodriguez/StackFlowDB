<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContaFlow — Tareas Predeterminadas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#1d1656; --blue1:#004aad; --blue2:#0041ff; --cyan:#289dd2;
  --white:#ffffff; --gray50:#f8f9fc; --gray100:#eef1f7; --gray200:#dce2f0;
  --gray300:#c4cad8; --gray500:#7a84a0; --gray700:#3d4460; --text:#1a1f36;
  --radius:10px; --radius-lg:14px;
  --shadow:0 2px 12px rgba(29,22,86,.08);
  --shadow-md:0 4px 20px rgba(29,22,86,.12);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Roboto',sans-serif;background:var(--gray50);color:var(--text);min-height:100vh;}

.topbar{background:var(--white);border-bottom:1px solid var(--gray100);height:56px;
  display:flex;align-items:center;justify-content:space-between;padding:0 28px;
  position:sticky;top:0;z-index:200;box-shadow:var(--shadow);}
.topbar-left{display:flex;align-items:center;gap:16px;}
.topbar-logo{font-size:18px;font-weight:700;color:var(--navy);}
.topbar-logo span{color:var(--cyan);}
.topbar-sep{width:1px;height:24px;background:var(--gray200);}
.topbar-page{font-size:14px;font-weight:500;color:var(--gray700);}
.topbar-right{display:flex;align-items:center;gap:12px;}
.user-chip{display:flex;align-items:center;gap:8px;padding:5px 12px;border-radius:20px;
  background:var(--gray50);border:1px solid var(--gray100);font-size:13px;font-weight:500;color:var(--gray700);}
.user-dot{width:8px;height:8px;border-radius:50%;}
.dot-admin{background:var(--blue1);}
.dot-directivo{background:#1a56db;}
.btn-nav{padding:7px 16px;border-radius:var(--radius);border:1px solid var(--gray200);
  background:var(--white);color:var(--gray700);font-family:'Roboto',sans-serif;
  font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;text-decoration:none;
  display:inline-flex;align-items:center;gap:6px;}
.btn-nav:hover{border-color:var(--blue1);color:var(--blue1);}
.btn-logout{padding:7px 16px;border-radius:var(--radius);border:none;
  background:var(--gray50);color:var(--gray500);font-family:'Roboto',sans-serif;
  font-size:13px;cursor:pointer;transition:all .2s;}
.btn-logout:hover{background:#fff1f0;color:#dc2626;}

.content{padding:28px;max-width:900px;margin:0 auto;}
.page-header{margin-bottom:24px;}
.page-title{font-size:22px;font-weight:700;color:var(--navy);letter-spacing:-.3px;}
.page-sub{font-size:13px;color:var(--gray500);margin-top:4px;}

.card{background:var(--white);border:1px solid var(--gray100);
  border-radius:var(--radius-lg);box-shadow:var(--shadow);margin-bottom:24px;}
.card-header{padding:20px 24px 16px;border-bottom:1px solid var(--gray100);}
.card-title{font-size:15px;font-weight:700;color:var(--navy);}
.card-sub-text{font-size:12px;color:var(--gray500);margin-top:2px;}

.crud-tabs{display:flex;gap:4px;padding:16px 24px 0;border-bottom:1px solid var(--gray100);}
.crud-tab{padding:9px 20px;border-radius:8px 8px 0 0;cursor:pointer;
  font-size:14px;font-weight:500;color:var(--gray500);
  border:1px solid transparent;border-bottom:none;
  transition:all .2s;position:relative;bottom:-1px;}
.crud-tab:hover{color:var(--text);}
.crud-tab.active{color:var(--navy);background:var(--white);border-color:var(--gray100);font-weight:700;}
.crud-pane{display:none;padding:24px;}
.crud-pane.active{display:block;}

.pred-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.pred-item{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;
  border-radius:var(--radius);background:var(--gray50);border:1px solid var(--gray100);
  transition:border-color .2s;}
.pred-item:hover{border-color:var(--gray300);}
.pred-num{font-size:12px;font-weight:700;color:var(--gray300);min-width:20px;padding-top:2px;}
.pred-item-main{flex:1;min-width:0;}
.pred-item-name{font-size:14px;color:var(--text);font-weight:500;}
.pred-item-desc{font-size:12px;color:var(--gray500);margin-top:4px;line-height:1.45;}
.pred-item-desc.empty{font-style:italic;color:var(--gray300);}
.pred-item-actions{display:flex;gap:6px;flex-shrink:0;}
.pred-edit-fields{display:none;flex:1;flex-direction:column;gap:8px;}
.pred-edit-fields input,.pred-edit-fields textarea{width:100%;padding:8px 12px;border:1.5px solid var(--blue1);
  border-radius:8px;font-family:'Roboto',sans-serif;font-size:14px;color:var(--text);
  background:var(--white);outline:none;}
.pred-edit-fields textarea{min-height:72px;resize:vertical;font-size:13px;line-height:1.45;}
.pred-edit-label{font-size:11px;font-weight:700;color:var(--gray500);text-transform:uppercase;letter-spacing:.5px;}
.btn-icon{width:32px;height:32px;border-radius:8px;border:1px solid var(--gray200);
  background:var(--white);cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:14px;transition:all .2s;}
.btn-icon:hover{border-color:var(--blue1);background:#eef3ff;}
.btn-icon.del:hover{border-color:#ef4444;background:#fff1f0;}
.pred-item.editing .pred-item-main{display:none;}
.pred-item.editing .pred-edit-fields{display:flex;}
.btn-save-edit{padding:7px 16px;border-radius:8px;border:none;background:var(--blue1);
  color:#fff;font-family:'Roboto',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;display:none;white-space:nowrap;align-self:flex-start;}
.pred-item.editing .btn-save-edit{display:inline-block;}
.pred-item.editing .btn-icon.edit{display:none;}

.pred-add-form{padding:18px;background:var(--gray50);border-radius:var(--radius);
  border:1.5px dashed var(--gray300);}
.pred-add-label{font-size:12px;font-weight:700;color:var(--gray500);
  margin-bottom:10px;text-transform:uppercase;letter-spacing:.6px;}
.pred-add-fields{display:flex;flex-direction:column;gap:10px;}
.pred-add-row{display:flex;gap:10px;}
.pred-add-row input,.pred-add-fields textarea{padding:11px 14px;border:1.5px solid var(--gray200);
  border-radius:var(--radius);font-family:'Roboto',sans-serif;font-size:14px;
  color:var(--text);background:var(--white);outline:none;transition:border-color .2s;}
.pred-add-row input{flex:1;}
.pred-add-fields textarea{min-height:72px;resize:vertical;font-size:13px;line-height:1.45;}
.pred-add-row input:focus,.pred-add-fields textarea:focus{border-color:var(--blue1);box-shadow:0 0 0 3px rgba(0,74,173,.07);}
.btn-add-pred{padding:11px 20px;border-radius:var(--radius);border:none;
  background:linear-gradient(135deg,var(--blue1),var(--blue2));color:#fff;
  font-family:'Roboto',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;transition:all .2s;white-space:nowrap;
  box-shadow:0 3px 10px rgba(0,65,255,.2);}
.btn-add-pred:hover{box-shadow:0 5px 16px rgba(0,65,255,.3);transform:translateY(-1px);}

.empty-state{text-align:center;padding:36px;color:var(--gray500);}
.empty-icon{font-size:32px;margin-bottom:10px;}
.empty-text{font-size:14px;}

.toast{position:fixed;bottom:28px;right:28px;z-index:9999;
  padding:12px 20px;border-radius:var(--radius);font-size:13px;font-weight:500;
  box-shadow:var(--shadow-md);display:flex;align-items:center;gap:8px;
  transform:translateY(80px);opacity:0;transition:all .3s;color:#fff;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{background:#16a34a;}
.toast.error{background:#dc2626;}
.toast.info{background:var(--navy);}

.modal-overlay{position:fixed;inset:0;background:rgba(29,22,86,.35);
  display:none;align-items:center;justify-content:center;z-index:500;}
.modal-overlay.show{display:flex;}
.modal{background:var(--white);border-radius:var(--radius-lg);
  padding:28px 32px;width:380px;box-shadow:var(--shadow-md);}
.modal-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:8px;}
.modal-body{font-size:14px;color:var(--gray700);margin-bottom:24px;line-height:1.5;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;}
.btn-cancel{padding:9px 20px;border-radius:var(--radius);border:1px solid var(--gray200);
  background:var(--white);color:var(--gray700);font-family:'Roboto',sans-serif;
  font-size:13px;font-weight:500;cursor:pointer;}
.btn-cancel:hover{border-color:var(--gray500);}
.btn-confirm{padding:9px 20px;border-radius:var(--radius);border:none;
  background:#dc2626;color:#fff;font-family:'Roboto',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;}
.btn-confirm:hover{background:#b91c1c;}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--gray200);border-radius:3px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-logo">Conta<span>Flow</span></span>
    <span class="topbar-sep"></span>
    <span class="topbar-page">Tareas Predeterminadas</span>
  </div>
  <div class="topbar-right">
    <div class="user-chip">
      <span class="user-dot" id="user-dot"></span>
      <span id="user-name">—</span>
    </div>
    <a class="btn-nav" href="asignar_tareas.html">← Volver a Asignar</a>
    <button class="btn-logout" onclick="logout()">Salir</button>
  </div>
</div>

<div class="content">
  <div class="page-header">
    <div class="page-title">Tareas Predeterminadas</div>
    <div class="page-sub">Gestiona el catálogo de tareas anuales y mensuales que se usan al asignar empresas.</div>
  </div>

  <div class="card">
    <div class="crud-tabs">
      <div class="crud-tab active" onclick="switchTab('anual',this)">📅 Anuales</div>
      <div class="crud-tab" onclick="switchTab('mensual',this)">🗓 Mensuales</div>
    </div>

    <div class="crud-pane active" id="pane-anual">
      <div class="pred-list" id="list-anual"></div>
      <div class="pred-add-form">
        <div class="pred-add-label">Nueva tarea anual</div>
        <div class="pred-add-fields">
          <input type="text" id="new-anual" placeholder="Nombre de la tarea..."/>
          <textarea id="new-desc-anual" placeholder="Descripción (opcional) — aparece en el detalle de cada tarea asignada."></textarea>
          <div class="pred-add-row">
            <button class="btn-add-pred" onclick="addPred('anual')">+ Agregar</button>
          </div>
        </div>
      </div>
    </div>

    <div class="crud-pane" id="pane-mensual">
      <div class="pred-list" id="list-mensual"></div>
      <div class="pred-add-form">
        <div class="pred-add-label">Nueva tarea mensual</div>
        <div class="pred-add-fields">
          <input type="text" id="new-mensual" placeholder="Nombre de la tarea..."/>
          <textarea id="new-desc-mensual" placeholder="Descripción (opcional) — aparece en el detalle de cada tarea asignada."></textarea>
          <div class="pred-add-row">
            <button class="btn-add-pred" onclick="addPred('mensual')">+ Agregar</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modal-del">
  <div class="modal">
    <div class="modal-title">Eliminar tarea</div>
    <div class="modal-body" id="modal-body">¿Estás seguro?</div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-confirm" onclick="confirmDelete()">Eliminar</button>
    </div>
  </div>
</div>

<script src="db.js"></script>
<script>
let session = null;
let deletePendingId = null;

document.addEventListener('DOMContentLoaded', () => {
  session = DB.requireSession(['admin','directivo']);
  if (!session) return;
  document.getElementById('user-name').textContent = session.nombre;
  document.getElementById('user-dot').className = 'user-dot dot-' + session.rol;
  renderLists();
});

function switchTab(tipo, el) {
  document.querySelectorAll('.crud-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('pane-anual').classList.toggle('active', tipo==='anual');
  document.getElementById('pane-mensual').classList.toggle('active', tipo==='mensual');
}

function renderLists() {
  ['anual','mensual'].forEach(tipo => {
    const cont  = document.getElementById('list-' + tipo);
    const preds = DB.getTareasPred().filter(p => p.tipo===tipo && p.activa);
    cont.innerHTML = '';
    if (!preds.length) {
      cont.innerHTML = `<div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-text">Sin tareas en el catálogo. Agrega la primera.</div>
      </div>`; return;
    }
    preds.forEach((p, i) => {
      const item = document.createElement('div');
      item.className = 'pred-item'; item.id = 'pi-' + p.id;
      const desc = (p.descripcion || '').trim();
      const descHtml = desc ? escHtml(desc) : 'Sin descripción';
      item.innerHTML = `
        <span class="pred-num">${i+1}</span>
        <div class="pred-item-main">
          <div class="pred-item-name">${escHtml(p.nombre)}</div>
          <div class="pred-item-desc ${desc ? '' : 'empty'}">${descHtml}</div>
        </div>
        <div class="pred-edit-fields">
          <div>
            <div class="pred-edit-label">Nombre</div>
            <input class="pred-edit-name" value="${escHtml(p.nombre)}"/>
          </div>
          <div>
            <div class="pred-edit-label">Descripción</div>
            <textarea class="pred-edit-desc" placeholder="Texto que verán en el detalle de la tarea...">${escHtml(desc)}</textarea>
          </div>
        </div>
        <button class="btn-save-edit" onclick="saveEdit('${p.id}')">Guardar</button>
        <div class="pred-item-actions">
          <button class="btn-icon edit" onclick="startEdit('${p.id}')" title="Editar">✏️</button>
          <button class="btn-icon del" onclick="openDel('${p.id}','${escHtml(p.nombre)}')" title="Eliminar">🗑️</button>
        </div>`;
      cont.appendChild(item);
    });
  });
}

function addPred(tipo) {
  const inp = document.getElementById('new-' + tipo);
  const descInp = document.getElementById('new-desc-' + tipo);
  const nom = inp.value.trim();
  const descripcion = descInp ? descInp.value.trim() : '';
  if (!nom) { showToast('Escribe el nombre de la tarea.','error'); return; }
  DB.addTareaPred({ nombre: nom, tipo, descripcion });
  inp.value = '';
  if (descInp) descInp.value = '';
  renderLists();
  showToast('Tarea agregada al catálogo.','success');
}

function startEdit(id) {
  document.getElementById('pi-'+id).classList.add('editing');
  document.querySelector('#pi-'+id+' .pred-edit-name').focus();
}
function saveEdit(id) {
  const nom = document.querySelector('#pi-'+id+' .pred-edit-name').value.trim();
  const descripcion = document.querySelector('#pi-'+id+' .pred-edit-desc').value.trim();
  if (!nom) return;
  DB.updateTareaPred(id, { nombre: nom, descripcion });
  document.getElementById('pi-'+id).classList.remove('editing');
  renderLists();
  showToast('Tarea actualizada.','success');
}

function openDel(id, nombre) {
  deletePendingId = id;
  document.getElementById('modal-body').textContent =
    `¿Eliminar "${nombre}"? No afectará tareas ya asignadas.`;
  document.getElementById('modal-del').classList.add('show');
}
function closeModal() {
  deletePendingId = null;
  document.getElementById('modal-del').classList.remove('show');
}
function confirmDelete() {
  if (!deletePendingId) return;
  DB.deleteTareaPred(deletePendingId);
  closeModal(); renderLists();
  showToast('Tarea eliminada.','success');
}

function showToast(msg, tipo='info') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + tipo;
  setTimeout(() => t.className='toast', 3000);
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/'/g,"&#39;")
          .replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function logout() { DB.clearSession(); location.reload(); }
</script>
</body>
</html>
