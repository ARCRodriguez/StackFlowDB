<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zidkenu — Validación Directiva</title>
<link rel="stylesheet" href="zidkenu_style.css">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<script>
window.ZK_PAGE = { activePage: 'vista_directivo', pageTitle: 'Validación Directiva', pageSubtitle: 'Aprueba tareas de alto nivel pendientes de validación.' };
</script>
</head>
<body class="zk-app zk-tareas">

<nav class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <a href="dashboard.html" class="sidebar-brand-link">
      <img src="zidkenulogohorizontal.png" alt="Zidkenu Soluciones Empresariales" class="sidebar-logo-img">
    </a>
  </div>
  <div class="sidebar-user-info">
    <div class="user-avatar" id="sidebarAvatar">—</div>
    <div class="user-name-side" id="sidebarName">—</div>
    <span class="role-badge" id="sidebarRoleBadge">—</span>
  </div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
  <div class="sidebar-footer">
    <button type="button" class="logout-btn" onclick="ZK.logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      Cerrar sesión
    </button>
  </div>
</nav>

<main class="main-content">
  <div class="app-topbar">
    <div class="topbar-left">
      <h1 id="zkPageTitle">Validación Directiva</h1>
      <p id="zkPageSubtitle">Aprueba tareas de alto nivel pendientes de validación.</p>
    </div>
    <div class="topbar-right">
      <div class="zk-topbar-actions" id="zkTopbarExtra"></div>
      <span class="topbar-date" id="currentDate">—</span>
    </div>
  </div>
  <div class="page-content zk-page-content">
<div class="page-header">
    <div class="page-title">Vista General de Empresas</div>
    <div class="page-sub" id="page-sub">Haz click en una tarea para abrir su página de detalle.</div>
  </div>

  <!-- LEGEND -->
  <div class="legend">
    <div class="legend-item"><span class="sdot asignado"></span>Asignado</div>
    <div class="legend-item"><span class="sdot en_proceso"></span>En Proceso</div>
    <div class="legend-item"><span class="sdot en_validacion"></span>En Validación</div>
    <div class="legend-item"><span class="sdot completado"></span>Completado</div>
    <div class="legend-item">
      <span class="legend-box por_vencer"></span>No iniciada — Por Vencer
    </div>
    <div class="legend-item">
      <span class="legend-box vencido"></span>No iniciada — Vencida
    </div>
    <div class="legend-item">
      <img src="advertencia_media.png" class="legend-img" alt="obs media"/>Obs. media
    </div>
    <div class="legend-item">
      <img src="advertencia_alta.png" class="legend-img" alt="obs importante"/>Obs. importante
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filter-bar">
    <span class="filter-label">Filtrar:</span>
    <select id="f-contador" autocomplete="off" onchange="renderTable()"><option value="">Todos los contadores</option></select>
    <select id="f-comp" autocomplete="off" onchange="renderTable()">
      <option value="">Toda complejidad</option>
      <option value="Alta">Alta</option>
      <option value="Media">Media</option>
      <option value="Baja">Baja</option>
    </select>
    <select id="f-estado" autocomplete="off" onchange="renderTable()">
      <option value="">Todos los estados</option>
      <option value="asignado">Asignado</option>
      <option value="en_proceso">En Proceso</option>
      <option value="en_validacion">En Validación</option>
      <option value="por_vencer">Por Vencer</option>
      <option value="vencido">Vencido</option>
      <option value="completado">Completado</option>
    </select>
    <select id="f-tipo" autocomplete="off" onchange="renderTable()">
      <option value="">Todos los tipos</option>
      <option value="mensual">Mensuales</option>
      <option value="general">Generales / Esporádicas</option>
      <option value="anual">Anuales</option>
    </select>
  </div>

  <div class="table-wrap">
    <table class="big-table" id="main-table"></table>
  </div>

  </div>
</main>

<script src="db.js"></script>
<script src="tareas_api.js"></script>
<script src="zidkenu_shell.js"></script>
<script>
const PAGE_FILE = location.pathname.split('/').pop();
const PAGE_ROL  = PAGE_FILE.includes('directivo')?'directivo'
                : PAGE_FILE.includes('supervisor')?'supervisor':'admin';
let session = null;
const ORDEN_TIPO  = ['mensual','general','anual'];
const TIPO_COLOR  = {mensual:'#7c3aed',general:'#d97706',anual:'var(--blue1)'};
const TIPO_LABEL  = {mensual:'Mensuales',general:'Generales / Esporádicas',anual:'Anuales'};

document.addEventListener('DOMContentLoaded', async () => {
  await DB.ready;
  session = DB.requireSession(['admin','directivo','supervisor']);
  if (!session) return;
  const nameEl = document.getElementById('sidebarName');
  if (nameEl) nameEl.textContent = session.nombre;

  const pageSub = document.getElementById('page-sub');
  if (pageSub && session.rol === 'supervisor') {
    pageSub.textContent = 'Haz click en una tarea para validarla o ver el detalle en una página aparte.';
  }
  const btnAsignar = document.getElementById('btn-asignar');
  if (btnAsignar && session.rol !== 'supervisor') {
    btnAsignar.style.display = 'inline-flex';
  }

  const selCnt = document.getElementById('f-contador');
  if (selCnt) {
    DB.getUsuarios().filter(u => u.rol === 'contador').forEach(u => {
      const o = document.createElement('option');
      o.value = u.id;
      o.textContent = u.nombre;
      selCnt.appendChild(o);
    });
  }
  scheduleRenderTable();
});

function scheduleRenderTable() {
  const run = () => renderTable();
  run();
  setTimeout(run, 0);
}
window.addEventListener('pageshow', () => { if (session) renderTable(); });

/* ══ HELPERS ══ */
function fmtFecha(iso){
  if(!iso)return'—';
  const d=new Date(iso);
  return d.toLocaleDateString('es-PE',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function fmtFechaHora(iso){
  if(!iso)return null;
  const d=new Date(iso);
  return d.toLocaleDateString('es-PE',{day:'2-digit',month:'2-digit',year:'numeric'})
    +' '+d.toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'});
}
function fechaLimClass(l){
  if(!l)return'';
  const now=new Date();now.setHours(0,0,0,0);
  const lim=new Date(l+'T00:00:00');
  if(lim<now)return'vencida';
  if((lim-now)/86400000<=7)return'vence-pronto';
  return'';
}

/* Estado visual actualizado:
   - Si no iniciada (asignado) + vencida      → 'vencido_no_iniciado'
   - Si no iniciada (asignado) + ≤7d           → 'porvencer_no_iniciado'
   - Resto igual que antes */
function getEstadoVisual(tarea){
  if(tarea.estado==='completado')    return 'completado';
  if(tarea.estado==='en_validacion') return 'en_validacion';
  if(tarea.estado==='en_proceso')    return 'en_proceso';
  // asignado — chequear fechas
  if(tarea.fecha_limite){
    const now=new Date();now.setHours(0,0,0,0);
    const lim=new Date(tarea.fecha_limite+'T00:00:00');
    if(lim<now)              return 'vencido_no_iniciado';
    if((lim-now)/86400000<=7)return 'porvencer_no_iniciado';
  }
  return 'asignado';
}

/* Mapa estado → clase de círculo (solo los que tienen círculo) */
function estadoCirculo(estado){
  if(estado==='completado')    return 'completado';
  if(estado==='en_validacion') return 'en_validacion';
  if(estado==='en_proceso')    return 'en_proceso';
  return 'asignado'; // asignado, porvencer_no_iniciado, vencido_no_iniciado
}

/* ══ RENDER TABLE ══ */
function renderTable(){
  const fCnt   = document.getElementById('f-contador').value;
  const fComp  = document.getElementById('f-comp').value;
  const fEstad = document.getElementById('f-estado').value;
  const fTipo  = document.getElementById('f-tipo').value;
  const tiposMostrar = fTipo ? [fTipo] : ORDEN_TIPO;

  let asigs = DB.getAsignaciones().filter(a=>a.activa);
  if(fCnt)  asigs=asigs.filter(a=>a.contador_id===fCnt);
  if(fComp) asigs=asigs.filter(a=>{
    const e=DB.getEmpresa(a.empresa_id); return e&&e.complejidad===fComp;
  });
  const ORD={Alta:0,Media:1,Baja:2};
  asigs.sort((a,b)=>{
    const ea=DB.getEmpresa(a.empresa_id);
    const eb=DB.getEmpresa(b.empresa_id);
    return(ORD[ea?.complejidad]||9)-(ORD[eb?.complejidad]||9);
  });

  const table=document.getElementById('main-table');
  table.innerHTML='';
  if(!asigs.length){
    table.innerHTML='<tr><td class="empty-table" colspan="99">Sin empresas asignadas.</td></tr>';
    return;
  }

  const taskNames={mensual:[],general:[],anual:[]};
  asigs.forEach(a=>{
    DB.getTareasByAsignacion(a.id).forEach(t=>{
      if(!tiposMostrar.includes(t.tipo)||!taskNames[t.tipo])return;
      if(!taskNames[t.tipo].includes(t.nombre))taskNames[t.tipo].push(t.nombre);
    });
  });

  // THEAD
  const thead=document.createElement('thead');
  const trG=document.createElement('tr');
  const mkTh=(txt,cls,cs,rs,style)=>{
    const th=document.createElement('th');
    th.className=cls;th.colSpan=cs||1;th.rowSpan=rs||1;
    th.textContent=txt;if(style)th.style.cssText=style;
    return th;
  };
  trG.appendChild(mkTh('Empresa','th-fix th-empresa',1,2));
  if(session.rol!=='contador')
    trG.appendChild(mkTh('Contador','th-fix th-contador',1,2));
  trG.appendChild(mkTh('Tipo','th-fix th-tipo',1,2));
  tiposMostrar.forEach(tipo=>{
    if(!taskNames[tipo].length)return;
    const th=document.createElement('th');
    th.colSpan=taskNames[tipo].length;
    th.style.cssText=`background:var(--gray50);padding:7px 8px;font-size:11px;
      font-weight:700;text-align:center;color:${TIPO_COLOR[tipo]};
      border-left:3px solid ${TIPO_COLOR[tipo]};letter-spacing:.3px;`;
    th.textContent='— '+TIPO_LABEL[tipo]+' —';
    trG.appendChild(th);
  });
  trG.appendChild(mkTh('Fecha Límite','th-flimite',1,2));
  thead.appendChild(trG);

  const trN=document.createElement('tr');
  tiposMostrar.forEach(tipo=>{
    taskNames[tipo].forEach((nombre,ni)=>{
      const th=document.createElement('th');
      th.className='th-tarea-name '+tipo;
      th.textContent=nombre;
      if(ni===0)th.style.borderLeft=`3px solid ${TIPO_COLOR[tipo]}`;
      trN.appendChild(th);
    });
  });
  thead.appendChild(trN);
  table.appendChild(thead);

  // TBODY
  const tbody=document.createElement('tbody');
  asigs.forEach(a=>{
    const emp=DB.getEmpresa(a.empresa_id);
    const cnt=DB.getUsuario(a.contador_id);
    if(!emp)return;
    const todasTareas=DB.getTareasByAsignacion(a.id);
    const seccionesPresentes=ORDEN_TIPO.filter(t=>tiposMostrar.includes(t)&&todasTareas.some(ta=>ta.tipo===t));
    if(!seccionesPresentes.length)return;

    let seccionesRender=seccionesPresentes;
    if(fEstad){
      // mapear filtro a estado visual
      seccionesRender=seccionesPresentes.filter(t=>
        todasTareas.filter(ta=>ta.tipo===t).some(ta=>{
          const ev=getEstadoVisual(ta);
          if(fEstad==='por_vencer') return ev==='porvencer_no_iniciado';
          if(fEstad==='vencido')    return ev==='vencido_no_iniciado';
          return ev===fEstad;
        })
      );
      if(!seccionesRender.length)return;
    }

    seccionesRender.forEach((tipo,si)=>{
      const tr=document.createElement('tr');

      // Empresa rowspan
      if(si===0){
        const td=document.createElement('td');
        td.className='td-empresa';td.rowSpan=seccionesRender.length;
        const cc=emp.complejidad==='Alta'?'alta':emp.complejidad==='Media'?'media':'baja';
        td.innerHTML=`<div class="emp-cell">
          <span class="cdot cdot-${cc}" title="${emp.complejidad}"></span>
          <div><div class="emp-name">${emp.nombre}</div>
          <div class="emp-comp">${emp.complejidad}</div></div>
        </div>`;
        tr.appendChild(td);
      }

      // Contador rowspan
      if(si===0&&session.rol!=='contador'){
        const td=document.createElement('td');
        td.className='td-contador';td.rowSpan=seccionesRender.length;
        td.innerHTML=`<span class="cnt-badge">👤 ${cnt?cnt.nombre:'—'}</span>`;
        tr.appendChild(td);
      }

      // Tipo + progreso
      const tareasDeEste=todasTareas.filter(t=>t.tipo===tipo);
      const total=tareasDeEste.length;
      const completadas=tareasDeEste.filter(t=>t.estado==='completado').length;
      const pct=total?Math.round((completadas/total)*100):0;
      const progColors={mensual:'#7c3aed',general:'#d97706',anual:'var(--blue1)'};
      const tipoLabels={mensual:'Mensual',general:'General',anual:'Anual'};

      const tdTipo=document.createElement('td');
      tdTipo.className='td-tipo';
      tdTipo.style.borderLeft=`3px solid ${TIPO_COLOR[tipo]}`;
      tdTipo.innerHTML=`
        <div style="display:flex;flex-direction:column;gap:3px;align-items:flex-start;">
          <span class="tipo-tag ${tipo}">${tipoLabels[tipo]}</span>
          <div style="width:100%;min-width:72px;">
            <div class="prog-bar">
              <div class="prog-fill ${tipo}" style="width:${pct}%"></div>
            </div>
            <div class="prog-label">${completadas}/${total} (${pct}%)</div>
          </div>
        </div>`;
      tr.appendChild(tdTipo);

      // Celdas de tareas
      tiposMostrar.forEach(tipoCol=>{
        if(!taskNames[tipoCol].length)return;
        taskNames[tipoCol].forEach((nombre,ni)=>{
          const tdT=document.createElement('td');
          tdT.className='td-task';
          if(ni===0)tdT.style.borderLeft=`3px solid ${TIPO_COLOR[tipoCol]}`;

          if(tipoCol!==tipo){
            tdT.className+=' td-empty';
            tdT.innerHTML='<span style="color:var(--gray200)">—</span>';
            tr.appendChild(tdT);return;
          }

          const tarea=tareasDeEste.find(t=>t.nombre===nombre);
          if(!tarea){
            tdT.className+=' td-empty';
            tdT.innerHTML='<span style="color:var(--gray200)">—</span>';
            tr.appendChild(tdT);return;
          }

          const ev=getEstadoVisual(tarea);

          // Aplicar fondo naranja/rojo si no iniciada
          if(ev==='porvencer_no_iniciado') tdT.classList.add('bg-porvencer');
          if(ev==='vencido_no_iniciado')   tdT.classList.add('bg-vencido');

          // Filtro estado
          if(fEstad){
            const match =
              (fEstad==='por_vencer' && ev==='porvencer_no_iniciado')||
              (fEstad==='vencido'    && ev==='vencido_no_iniciado')  ||
              (fEstad===ev);
            if(!match){
              tdT.className+=' td-empty';
              tdT.innerHTML='<span style="color:var(--gray200)">—</span>';
              tr.appendChild(tdT);return;
            }
          }

          tdT.onclick=()=>goToDetalle(tarea.id);

          // Imagen de alerta
          tdT.innerHTML = DB.buildTaskCellHtml(tarea);
          tr.appendChild(tdT);
        });
      });

      // Fecha límite rowspan
      if(si===0){
        const tdF=document.createElement('td');
        tdF.className='td-flimite';tdF.rowSpan=seccionesRender.length;
        tdF.innerHTML=`<span class="fecha-lim ${fechaLimClass(a.fecha_limite)}">
          ${fmtFecha(a.fecha_limite)}</span>`;
        tr.appendChild(tdF);
      }
      tbody.appendChild(tr);
    });
  });
  table.appendChild(tbody);
}

function goToDetalle(tareaId) {
  window.location.href = `detalle_tarea.html?id=${encodeURIComponent(tareaId)}&from=${encodeURIComponent(PAGE_FILE)}`;
}
function logout(){ DB.clearSession(); location.reload(); }
</script>
<script src="footer_nav.js"></script>
</body>
</html>
