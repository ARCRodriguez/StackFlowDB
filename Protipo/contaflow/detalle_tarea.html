<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContaFlow — Detalle de Tarea</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#1d1656; --blue1:#004aad; --blue2:#0041ff; --cyan:#289dd2;
  --white:#ffffff; --gray50:#f8f9fc; --gray100:#eef1f7; --gray200:#dce2f0;
  --gray300:#c4cad8; --gray500:#7a84a0; --gray700:#3d4460; --text:#1a1f36;
  --radius:10px; --radius-lg:14px;
  --shadow:0 2px 12px rgba(29,22,86,.08);
  --c-asignado:#004aad; --c-proceso:#7c3aed; --c-validacion:#eab308;
  --c-completado:#16a34a; --c-porvencer:#f97316; --c-vencido:#dc2626;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Roboto',sans-serif;background:var(--gray50);color:var(--text);min-height:100vh;}

.topbar{background:var(--white);border-bottom:1px solid var(--gray100);height:60px;
  display:flex;align-items:center;justify-content:space-between;padding:0 28px;
  position:sticky;top:0;z-index:300;box-shadow:var(--shadow);}
.topbar-left{display:flex;align-items:center;gap:16px;}
.topbar-logo{font-size:19px;font-weight:700;color:var(--navy);}
.topbar-logo span{color:var(--cyan);}
.topbar-sep{width:1px;height:24px;background:var(--gray200);}
.topbar-page{font-size:14px;font-weight:500;color:var(--gray700);}
.topbar-right{display:flex;align-items:center;gap:12px;}
.user-chip{display:flex;align-items:center;gap:8px;padding:5px 14px;border-radius:20px;
  background:var(--gray50);border:1px solid var(--gray100);font-size:13px;font-weight:500;color:var(--gray700);}
.udot{width:9px;height:9px;border-radius:50%;}
.udot-admin{background:var(--blue1);}
.udot-directivo{background:#1a56db;}
.udot-supervisor{background:#0d9488;}
.btn-nav{padding:7px 16px;border-radius:var(--radius);border:1px solid var(--gray200);
  background:var(--white);color:var(--gray700);font-family:'Roboto',sans-serif;
  font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;text-decoration:none;
  display:inline-flex;align-items:center;gap:6px;}
.btn-nav:hover{border-color:var(--blue1);color:var(--blue1);}
.btn-logout{padding:7px 16px;border-radius:var(--radius);border:none;
  background:var(--gray50);color:var(--gray500);font-family:'Roboto',sans-serif;
  font-size:13px;cursor:pointer;transition:all .2s;}
.btn-logout:hover{background:#fff1f0;color:#dc2626;}

.content{padding:28px;max-width:720px;margin:0 auto;}
.back-row{margin-bottom:20px;}
.page-title{font-size:22px;font-weight:700;color:var(--navy);letter-spacing:-.3px;line-height:1.3;}
.detail-card{background:var(--white);border:1px solid var(--gray100);border-radius:var(--radius-lg);
  box-shadow:var(--shadow);padding:24px 28px;display:flex;flex-direction:column;gap:22px;}

.dsec{display:flex;flex-direction:column;gap:6px;}
.dsec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;
  color:var(--gray500);padding-bottom:6px;border-bottom:1px solid var(--gray100);}
.drow{display:flex;justify-content:space-between;align-items:flex-start;
  padding:6px 0;border-bottom:1px solid var(--gray50);}
.drow:last-child{border-bottom:none;}
.drow-label{font-size:13px;color:var(--gray500);font-weight:500;flex-shrink:0;margin-right:12px;}
.drow-value{font-size:13px;color:var(--text);font-weight:500;text-align:right;}
.drow-value.pending{color:var(--gray300);font-style:italic;font-weight:400;}

.estado-badge{display:inline-flex;align-items:center;gap:7px;padding:6px 14px;
  border-radius:20px;font-size:13px;font-weight:600;}
.eb-asignado{background:#eef3ff;color:var(--c-asignado);}
.eb-en_proceso{background:#f3eeff;color:var(--c-proceso);}
.eb-en_validacion{background:#fefce8;color:#a16207;}
.eb-completado{background:#f0fdf4;color:var(--c-completado);}
.eb-por_vencer{background:#fff7ed;color:var(--c-porvencer);}
.eb-vencido{background:#fff1f0;color:var(--c-vencido);}
.sdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.sdot.asignado{background:var(--c-asignado);box-shadow:0 0 6px var(--c-asignado);}
.sdot.en_proceso{background:var(--c-proceso);box-shadow:0 0 6px var(--c-proceso);}
.sdot.en_validacion{background:var(--c-validacion);box-shadow:0 0 6px var(--c-validacion);}
.sdot.completado{background:var(--c-completado);box-shadow:0 0 6px var(--c-completado);}

.desc-box{background:var(--gray50);border:1px solid var(--gray100);border-radius:var(--radius);
  padding:12px 14px;font-size:14px;color:var(--gray700);line-height:1.65;}
.desc-empty{color:var(--gray300);font-style:italic;font-size:13px;}

.hist-item{display:flex;align-items:center;gap:8px;padding:6px 0;
  border-bottom:1px solid var(--gray50);font-size:12px;color:var(--gray700);}
.hist-item:last-child{border-bottom:none;}
.comment-item{padding:10px 12px;border-radius:var(--radius);border:1px solid var(--gray100);
  margin-bottom:8px;font-size:13px;}
.comment-item.observacion_alta{border-color:#fca5a5;background:#fff1f0;}
.comment-item.observacion_media{border-color:#fde68a;background:#fffbeb;}
.comment-meta{font-size:11px;color:var(--gray500);margin-top:5px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-logo">Conta<span>Flow</span></span>
    <span class="topbar-sep"></span>
    <span class="topbar-page">Detalle de tarea</span>
  </div>
  <div class="topbar-right">
    <div class="user-chip">
      <span class="udot" id="udot"></span>
      <span id="uname">—</span>
    </div>
    <button class="btn-logout" onclick="logout()">Salir</button>
  </div>
</div>

<div class="content">
  <div class="back-row">
    <a class="btn-nav" id="btn-volver" href="vista_supervisor.html">← Volver a Vista General</a>
  </div>
  <h1 class="page-title" id="page-title">—</h1>
  <div class="detail-card" id="detail-body" style="margin-top:20px;"></div>
</div>

<script src="db.js"></script>
<script>
const VISTA_POR_ROL = {
  admin: 'vista_admin.html',
  directivo: 'vista_directivo.html',
  supervisor: 'vista_supervisor.html'
};

let session = null;
const tareaId = new URLSearchParams(location.search).get('id');
const fromParam = new URLSearchParams(location.search).get('from');

function fmtFecha(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('es-PE', { day: '2-digit', month: '2-digit', year: 'numeric' });
}
function fmtFechaHora(iso) {
  if (!iso) return null;
  const d = new Date(iso);
  return d.toLocaleDateString('es-PE', { day: '2-digit', month: '2-digit', year: 'numeric' })
    + ' ' + d.toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit' });
}
function getEstadoVisual(tarea) {
  if (tarea.estado === 'completado') return 'completado';
  if (tarea.estado === 'en_validacion') return 'en_validacion';
  if (tarea.estado === 'en_proceso') return 'en_proceso';
  if (tarea.fecha_limite) {
    const now = new Date(); now.setHours(0, 0, 0, 0);
    const lim = new Date(tarea.fecha_limite + 'T00:00:00');
    if (lim < now) return 'vencido_no_iniciado';
    if ((lim - now) / 86400000 <= 7) return 'porvencer_no_iniciado';
  }
  return 'asignado';
}
function estadoCirculo(estado) {
  if (estado === 'completado') return 'completado';
  if (estado === 'en_validacion') return 'en_validacion';
  if (estado === 'en_proceso') return 'en_proceso';
  return 'asignado';
}
function vistaVolver(rol) {
  if (fromParam && ['vista_admin.html', 'vista_directivo.html', 'vista_supervisor.html'].includes(fromParam))
    return fromParam;
  return VISTA_POR_ROL[rol] || 'vista_supervisor.html';
}
function resolveDescripcion(tarea) {
  if (tarea.tarea_pred_id) {
    const pred = DB.getTareaPred(tarea.tarea_pred_id);
    if (pred && pred.descripcion && String(pred.descripcion).trim())
      return String(pred.descripcion).trim();
  }
  const pred = DB.getTareasPred().find(p =>
    p.activa && p.nombre === tarea.nombre && p.tipo === tarea.tipo && p.descripcion
  );
  if (pred) return String(pred.descripcion).trim();
  return (tarea.descripcion || '').trim();
}

function renderDetalle() {
  const tarea = DB.getTareaAsignada(tareaId);
  if (!tarea) {
    window.location.href = vistaVolver(session.rol);
    return;
  }

  const emp = DB.getEmpresa(tarea.empresa_id);
  const cnt = DB.getUsuario(tarea.contador_id);
  const ev = getEstadoVisual(tarea);
  const historial = DB.getHistorialByTarea(tareaId);
  const comentarios = DB.getComentariosByTarea(tareaId);

  document.getElementById('page-title').textContent = tarea.nombre;
  document.title = 'ContaFlow — ' + tarea.nombre;

  const estadoLabels = {
    asignado: 'Asignado', en_proceso: 'En Proceso', en_validacion: 'En Validación',
    completado: 'Completado', porvencer_no_iniciado: 'Por Vencer (no iniciada)',
    vencido_no_iniciado: 'Vencida (no iniciada)'
  };
  const pend = v => v
    ? `<span class="drow-value">${v}</span>`
    : `<span class="drow-value pending">Pendiente</span>`;

  const descTexto = resolveDescripcion(tarea);
  const ebClass = ev.includes('_no_') ? ev.split('_no_')[0] : ev;

  let body = `
    <div class="dsec">
      <div class="dsec-title">Estado actual</div>
      <span class="estado-badge eb-${ebClass}">
        <span class="sdot ${estadoCirculo(ev)}"></span>
        ${estadoLabels[ev] || ev}
      </span>
      ${tarea.prioridad_observacion ? `
        <div style="margin-top:10px;display:flex;align-items:center;gap:8px;padding:8px 12px;
          border-radius:8px;background:${tarea.prioridad_observacion === 'alta' ? '#fff1f0' : '#fffbeb'};
          border:1px solid ${tarea.prioridad_observacion === 'alta' ? '#fca5a5' : '#fde68a'};">
          <img src="advertencia_${tarea.prioridad_observacion}.png"
            style="width:20px;height:20px;object-fit:contain;" alt="obs"/>
          <span style="font-size:13px;font-weight:600;
            color:${tarea.prioridad_observacion === 'alta' ? '#dc2626' : '#d97706'}">
            ${tarea.prioridad_observacion === 'alta' ? 'Observación importante' : 'Observación media'}
          </span>
        </div>` : ''}
    </div>

    <div class="dsec">
      <div class="dsec-title">Información de la tarea</div>
      <div class="drow"><span class="drow-label">Empresa</span>
        <span class="drow-value">${emp?.nombre || '—'}</span></div>
      <div class="drow"><span class="drow-label">Contador</span>
        <span class="drow-value">${cnt?.nombre || '—'}</span></div>
      <div class="drow"><span class="drow-label">Tipo</span>
        <span class="drow-value">${tarea.tipo === 'mensual' ? 'Mensual' : tarea.tipo === 'anual' ? 'Anual' : 'General'}</span></div>
    </div>

    <div class="dsec">
      <div class="dsec-title">Descripción</div>
      <div class="desc-box">${descTexto
        ? descTexto.replace(/</g, '&lt;').replace(/>/g, '&gt;')
        : '<span class="desc-empty">Sin descripción</span>'}</div>
    </div>

    <div class="dsec">
      <div class="dsec-title">Registro de fechas</div>
      <div class="drow"><span class="drow-label">Fecha límite</span>
        <span class="drow-value">${fmtFecha(tarea.fecha_limite)}</span></div>
      <div class="drow"><span class="drow-label">Asignada el</span>
        <span class="drow-value">${fmtFechaHora(tarea.fecha_asignacion) || '—'}</span></div>
      <div class="drow"><span class="drow-label">Iniciada el</span>
        ${pend(fmtFechaHora(tarea.fecha_inicio))}</div>
      <div class="drow"><span class="drow-label">Validación solicitada</span>
        ${pend(fmtFechaHora(tarea.fecha_validacion_solicitada))}</div>
      <div class="drow"><span class="drow-label">Completada el</span>
        ${pend(fmtFechaHora(tarea.fecha_completado))}</div>
    </div>`;

  if (historial.length > 1) {
    body += `<div class="dsec"><div class="dsec-title">Historial de asignación</div>`;
    historial.forEach(h => {
      const u = DB.getUsuario(h.contador_id);
      body += `<div class="hist-item"><span>👤</span>
        <span style="font-weight:600">${u?.nombre || '—'}</span>
        <span style="color:var(--gray500)">desde ${fmtFechaHora(h.fecha_desde)}</span>
        ${h.fecha_hasta ? `<span>→ ${fmtFechaHora(h.fecha_hasta)}</span>`
          : '<span style="color:var(--c-completado);font-weight:600">actual</span>'}
      </div>`;
    });
    body += '</div>';
  }

  if (comentarios.length) {
    body += `<div class="dsec"><div class="dsec-title">Comentarios y observaciones</div>`;
    comentarios.forEach(c => {
      const autor = DB.getUsuario(c.autor_id);
      body += `<div class="comment-item ${c.tipo}">
        <div>${c.texto}</div>
        ${c.archivo_nombre ? `<div style="margin-top:5px;font-size:12px;color:var(--blue1)">📎 ${c.archivo_nombre}</div>` : ''}
        <div class="comment-meta">${autor?.nombre || '—'} · ${fmtFechaHora(c.fecha)}
          ${c.tipo === 'observacion_alta' ? '· <strong style="color:#dc2626">Obs. importante</strong>'
            : c.tipo === 'observacion_media' ? '· <strong style="color:#d97706">Obs. media</strong>' : ''}
        </div>
      </div>`;
    });
    body += '</div>';
  }

  if (session.rol === 'supervisor' && tarea.estado === 'en_validacion') {
    body += `<div class="dsec">
      <div class="dsec-title">Validación del supervisor</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <button onclick="validarTarea()"
          style="padding:12px;border-radius:var(--radius);border:none;
          background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;
          font-family:'Roboto',sans-serif;font-size:14px;font-weight:600;cursor:pointer;">
          ✓ Validar y completar tarea
        </button>
        <div style="font-size:12px;font-weight:600;color:var(--gray700);margin-top:4px;">
          Rechazar con observación:
        </div>
        <textarea id="obs-texto" placeholder="Escribe la observación..."
          style="width:100%;padding:10px 12px;border:1.5px solid var(--gray200);
          border-radius:var(--radius);font-family:'Roboto',sans-serif;font-size:13px;
          resize:vertical;min-height:72px;outline:none;"></textarea>
        <div style="display:flex;gap:8px;">
          <button onclick="rechazarTarea('media')"
            style="flex:1;padding:9px;border-radius:var(--radius);border:1.5px solid #d97706;
            background:#fffbeb;color:#d97706;font-family:'Roboto',sans-serif;
            font-size:13px;font-weight:600;cursor:pointer;">
            ⚠ Obs. media
          </button>
          <button onclick="rechazarTarea('alta')"
            style="flex:1;padding:9px;border-radius:var(--radius);border:1.5px solid #dc2626;
            background:#fff1f0;color:#dc2626;font-family:'Roboto',sans-serif;
            font-size:13px;font-weight:600;cursor:pointer;">
            ▲ Obs. importante
          </button>
        </div>
      </div>
    </div>`;
  }

  document.getElementById('detail-body').innerHTML = body;
}

function validarTarea() {
  DB.validarTarea(tareaId);
  window.location.href = vistaVolver(session.rol);
}
function rechazarTarea(prioridad) {
  const texto = document.getElementById('obs-texto')?.value.trim();
  if (!texto) { alert('Escribe una observación antes de rechazar.'); return; }
  DB.rechazarTarea(tareaId, prioridad, texto, session.id);
  window.location.href = vistaVolver(session.rol);
}
function logout() { DB.clearSession(); window.location.href = 'login.html'; }

document.addEventListener('DOMContentLoaded', () => {
  session = DB.requireSession(['admin', 'directivo', 'supervisor']);
  if (!session) return;
  if (!tareaId) {
    window.location.href = vistaVolver(session?.rol || 'supervisor');
    return;
  }
  document.getElementById('uname').textContent = session.nombre;
  document.getElementById('udot').className = 'udot udot-' + session.rol;
  const volver = document.getElementById('btn-volver');
  volver.href = vistaVolver(session.rol);
  renderDetalle();
});
</script>
</body>
</html>
