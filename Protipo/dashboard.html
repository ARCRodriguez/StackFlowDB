// ═══════════════════════════════════════════════════════
//  FUNCIONES DE CÁLCULO DE STATS
// ═══════════════════════════════════════════════════════

function calcStats(user) {
  const rol = user.rol;
  const uid = user.id;

  if (rol === 'usuario') {
    const misTareas = TAREAS.filter(t => t.contadorId === uid);
    const total       = misTareas.length;
    const completadas = misTareas.filter(t => t.estado === 'completada' || t.estado === 'aprobada').length;
    const pendientes  = misTareas.filter(t => t.estado === 'pendiente').length;
    const enProgreso  = misTareas.filter(t => t.estado === 'en_progreso').length;
    const pct = total > 0 ? Math.round((completadas / total) * 100) : 0;
    return { pendientes, completadas, enProgreso, cumplimiento: pct };
  }

  if (rol === 'contador') {
    const misTareas = TAREAS.filter(t => t.contadorId === uid);
    const total       = misTareas.length;
    const completadas = misTareas.filter(t => t.estado === 'completada' || t.estado === 'aprobada').length;
    const pendientes  = misTareas.filter(t => t.estado === 'pendiente').length;
    const enProgreso  = misTareas.filter(t => t.estado === 'en_progreso').length;
    const pct = total > 0 ? Math.round((completadas / total) * 100) : 0;
    const empresas = [...new Set(misTareas.map(t => t.empresaId))].length;
    return { pendientes, completadas, enProgreso, cumplimiento: pct, misEmpresas: empresas };
  }

  if (rol === 'supervisor') {
    // Supervisor ve tareas de contadores y usuarios
    const contadores = USUARIOS_DATA.filter(u => u.rol === 'contador' || u.rol === 'usuario').map(u => u.id);
    const tareas = TAREAS.filter(t => contadores.includes(t.contadorId));
    const total       = tareas.length;
    const completadas = tareas.filter(t => t.estado === 'completada' || t.estado === 'aprobada').length;
    const pendientes  = tareas.filter(t => t.estado === 'pendiente').length;
    const enProgreso  = tareas.filter(t => t.estado === 'en_progreso').length;
    const pct = total > 0 ? Math.round((completadas / total) * 100) : 0;
    const activos = USUARIOS_DATA.filter(u => u.activo && (u.rol === 'contador' || u.rol === 'usuario')).length;
    return { pendientes, completadas, enProgreso, cumplimiento: pct, colaboradoresActivos: activos };
  }

  // directivo / administrador — vista global
  const total       = TAREAS.length;
  const completadas = TAREAS.filter(t => t.estado === 'completada' || t.estado === 'aprobada').length;
  const pendientes  = TAREAS.filter(t => t.estado === 'pendiente').length;
  const enProgreso  = TAREAS.filter(t => t.estado === 'en_progreso').length;
  const pct = total > 0 ? Math.round((completadas / total) * 100) : 0;
  const empresasActivas = EMPRESAS.filter(e => e.estado === 'activo').length;
  const usuariosActivos = USUARIOS_DATA.filter(u => u.activo).length;
  return { pendientes, completadas, enProgreso, cumplimiento: pct, empresasActivas, usuariosActivos };
}

//  INIT

let currentUser = null;

document.addEventListener('DOMContentLoaded', () => {
  const stored = sessionStorage.getItem('zidkenu_user');
  if (!stored) { window.location.href = 'login.html'; return; }
  currentUser = JSON.parse(stored);

  if (!rolConfig[currentUser.rol]) {
    showToast('⚠️ Rol no reconocido. Redirigiendo...');
    setTimeout(() => logout(), 2000);
    return;
  }

  setDate();
  buildSidebar(currentUser);
  buildWelcome(currentUser);
  buildStats(currentUser);
  buildModules(currentUser);
});

function setDate() {
  const now = new Date();
  document.getElementById('currentDate').textContent =
    now.toLocaleDateString('es-PE', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
}

function buildSidebar(user) {
  const cfg = rolConfig[user.rol];
  const initials = user.nombre.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  const av = document.getElementById('sidebarAvatar');
  av.textContent  = initials;
  av.style.background = cfg.gradientAvatar;

  document.getElementById('sidebarName').textContent = user.nombre;
  const rb = document.getElementById('sidebarRoleBadge');
  rb.textContent   = rolLabels[user.rol] || user.rol;
  rb.style.background = cfg.badgeBg;
  rb.style.color      = cfg.badgeColor;

  const checkSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`;
  const navItems = cfg.nav();
  document.getElementById('sidebarNav').innerHTML = navItems.map(item => {
    if (item.section) return `<div class="nav-section-label">${item.section}</div>`;
    return `<a class="nav-item ${item.active ? 'active' : ''}" href="${item.href}">${item.icon}${item.label}</a>`;
  }).join('');
}

function buildWelcome(user) {
  const cfg = rolConfig[user.rol];
  document.getElementById('welcomeRoleLine').textContent  = cfg.welcomeRol;
  document.getElementById('welcomeName').textContent      = `Bienvenido, ${user.nombre.split(' ')[0]}`;
  document.getElementById('welcomeSubtitle').textContent  = cfg.subtitle;
  document.getElementById('pageTitle').textContent        = cfg.welcomeRol;
  document.getElementById('pageSubtitle').textContent     = `Sesión activa · ${rolLabels[user.rol]}`;
}

function buildStats(user) {
  const cfg   = rolConfig[user.rol];
  const stats = calcStats(user);
  const cards = cfg.buildStats(stats);
  const statsRow = document.getElementById('statsRow');

  statsRow.innerHTML = cards.map(c => `
    <div class="stat-card">
      <div class="stat-icon" style="background:${c.iconBg};color:${c.iconColor}">${c.icon}</div>
      <div class="stat-label">${c.label}</div>
      <div class="stat-value">${c.value}</div>
      <div class="stat-change ${c.cls}">${c.change}</div>
      ${c.bar !== undefined ? `
        <div class="progress-bar-wrap" style="margin-top:10px">
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="bar_${c.label.replace(/\s/g,'')}"
              style="width:0%;background:linear-gradient(90deg,#013657,#01ADF3)"></div>
          </div>
        </div>` : ''}
    </div>
  `).join('');

  // Animar barras de progreso
  setTimeout(() => {
    cards.forEach(c => {
      if (c.bar !== undefined) {
        const el = document.getElementById('bar_' + c.label.replace(/\s/g,''));
        if (el) el.style.width = c.bar + '%';
      }
    });
  }, 200);
}

function buildModules(user) {
  const cfg  = rolConfig[user.rol];
  const grid = document.getElementById('modulesGrid');

  const typeMap = {
    full:       { cls:'access-full',       icon:'✅' },
    validacion: { cls:'access-validacion', icon:'🔍' },
    admin:      { cls:'access-admin',      icon:'⚙️' },
    bi:         { cls:'access-bi',         icon:'📊' },
  };

  grid.innerHTML = cfg.modules.map(m => {
    const t = typeMap[m.type] || typeMap.full;
    return `
      <a class="module-card" href="${m.href}">
        <div class="module-icon-wrap" style="background:${m.iconBg}">${m.icon}</div>
        <div class="module-title">${m.title}</div>
        <div class="module-desc">${m.desc}</div>
        <span class="module-access-label ${t.cls}">${t.icon} ${m.access}</span>
      </a>`;
  }).join('');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.style.display = 'flex';
  setTimeout(() => { t.style.display = 'none'; }, 3000);
}

function logout() {
  if (confirm('¿Cerrar sesión?')) {
    sessionStorage.removeItem('zidkenu_user');
    window.location.href = 'login.html';
  }
}
</script>


<script>
function toggleDashMenu() {
  const menu    = document.getElementById('dashMenu');
  const chevron = document.getElementById('dashChevron');
  const open    = menu.style.display === 'block';
  menu.style.display = open ? 'none' : 'block';
  chevron.style.transform = open ? 'rotate(0deg)' : 'rotate(180deg)';
}

document.addEventListener('click', function(e) {
  const toggle = document.getElementById('btnDashToggle');
  const menu   = document.getElementById('dashMenu');

  if (menu && toggle && !toggle.contains(e.target) && !menu.contains(e.target)) {
    menu.style.display = 'none';

    const chevron = document.getElementById('dashChevron');
    if (chevron) chevron.style.transform = 'rotate(0deg)';
  }
});

function irDashboard(event, url) {
  event.preventDefault();
  window.location.href = url;
}
</script>
