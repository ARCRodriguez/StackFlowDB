<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zidkenu — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1d1656;
    --blue-dark: #004aad;
    --blue-main: #0041ff;
    --blue-light: #289dd2;
    --white: #ffffff;
    --gray-50: #f8faff;
    --gray-100: #eef2ff;
    --gray-200: #dde4f5;
    --gray-300: #c3cfe8;
    --gray-500: #8896b3;
    --gray-700: #4a5578;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --green: #059669;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--gray-50);
    min-height: 100vh;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    position: fixed;
    top: 0; left: 0;
    width: 260px;
    height: 100vh;
    background: linear-gradient(175deg, var(--navy) 0%, #0d0e3f 100%);
    display: flex;
    flex-direction: column;
    z-index: 100;
    box-shadow: 4px 0 20px rgba(0,0,0,0.15);
  }

  .sidebar-brand {
    padding: 28px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--blue-main), var(--blue-light));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-mark svg { width: 22px; height: 22px; }

  .brand-text {
    font-size: 1.25rem; font-weight: 800;
    color: var(--white);
    letter-spacing: -0.3px;
  }
  .brand-text span { color: var(--blue-light); }

  .sidebar-user-info {
    padding: 20px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .user-avatar {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 10px;
    color: white;
  }

  .user-name-side {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 4px;
  }

  .role-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .sidebar-nav {
    flex: 1;
    padding: 16px 12px;
    overflow-y: auto;
  }

  .nav-section-label {
    font-size: 0.7rem;
    font-weight: 600;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 0 12px;
    margin: 16px 0 8px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    border-radius: 10px;
    color: rgba(255,255,255,0.65);
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 2px;
    text-decoration: none;
  }

  .nav-item:hover {
    background: rgba(255,255,255,0.08);
    color: white;
  }

  .nav-item.active {
    background: linear-gradient(135deg, var(--blue-dark), var(--blue-main));
    color: white;
    box-shadow: 0 4px 12px rgba(0,65,255,0.35);
  }

  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

  .sidebar-footer {
    padding: 16px 12px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }

  .logout-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 11px 14px;
    border-radius: 10px;
    background: rgba(239,68,68,0.12);
    color: #fc8181;
    border: none;
    font-family: 'Sora', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .logout-btn:hover { background: rgba(239,68,68,0.25); color: #feb2b2; }
  .logout-btn svg { width: 18px; height: 18px; }

  /* ── MAIN CONTENT ── */
  .main-content {
    margin-left: 260px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--white);
    border-bottom: 1px solid var(--gray-200);
    padding: 0 36px;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .topbar-left h1 {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--navy);
  }

  .topbar-left p {
    font-size: 0.8rem;
    color: var(--gray-500);
    margin-top: 2px;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .topbar-date {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--gray-500);
    background: var(--gray-100);
    padding: 6px 12px;
    border-radius: 8px;
  }

  /* ── PAGE CONTENT ── */
  .page-content {
    flex: 1;
    padding: 36px;
  }

  /* Welcome Banner */
  .welcome-banner {
    background: linear-gradient(135deg, var(--navy) 0%, var(--blue-dark) 60%, var(--blue-light) 100%);
    border-radius: 20px;
    padding: 32px 36px;
    margin-bottom: 36px;
    position: relative;
    overflow: hidden;
  }

  .welcome-banner::before {
    content: '';
    position: absolute;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    right: -80px; top: -80px;
  }

  .welcome-banner::after {
    content: '';
    position: absolute;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(40,157,210,0.15);
    right: 80px; bottom: -80px;
  }

  .welcome-role-line {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--blue-light);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .welcome-role-line::before {
    content: '';
    display: inline-block;
    width: 24px;
    height: 2px;
    background: var(--blue-light);
    border-radius: 2px;
  }

  .welcome-name {
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--white);
    margin-bottom: 8px;
    position: relative;
    z-index: 2;
  }

  .welcome-subtitle {
    color: rgba(255,255,255,0.7);
    font-size: 0.9rem;
    font-weight: 400;
    max-width: 500px;
    line-height: 1.6;
    position: relative;
    z-index: 2;
  }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 18px;
    margin-bottom: 36px;
  }

  .stat-card {
    background: var(--white);
    border: 1.5px solid var(--gray-200);
    border-radius: 16px;
    padding: 20px 22px;
    transition: all 0.25s;
  }

  .stat-card:hover {
    border-color: var(--blue-main);
    box-shadow: 0 4px 20px rgba(0,65,255,0.1);
    transform: translateY(-2px);
  }

  .stat-label {
    font-size: 0.75rem;
    color: var(--gray-500);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 1.9rem;
    font-weight: 800;
    color: var(--navy);
    font-family: 'DM Mono', monospace;
  }

  .stat-change {
    font-size: 0.78rem;
    margin-top: 4px;
    font-weight: 500;
  }

  .stat-change.up { color: var(--success); }
  .stat-change.neutral { color: var(--gray-500); }

  /* ── MODULE CARDS ── */
  .section-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--gray-200);
  }

  .modules-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 24px;
    justify-items: center;
    margin-bottom: 36px;
  }

  .module-card {
    background: var(--white);
    border: 2px solid var(--gray-200);
    border-radius: 20px;
    padding: 32px 28px;
    width: 100%;
    max-width: 300px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    text-align: center;
    text-decoration: none;
    display: block;
  }

  .module-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 4px;
    background: linear-gradient(90deg, var(--blue-dark), var(--blue-light));
    transform: scaleX(0);
    transition: transform 0.3s;
  }

  .module-card:hover {
    border-color: var(--blue-main);
    transform: translateY(-5px);
    box-shadow: 0 12px 40px rgba(0,65,255,0.15);
  }

  .module-card:hover::before { transform: scaleX(1); }

  .module-icon-wrap {
    width: 68px; height: 68px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 18px;
    transition: transform 0.3s;
  }

  .module-card:hover .module-icon-wrap { transform: scale(1.1) rotate(-5deg); }
  .module-icon-wrap svg { width: 32px; height: 32px; }

  .module-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 8px;
  }

  .module-desc {
    font-size: 0.82rem;
    color: var(--gray-500);
    line-height: 1.6;
    margin-bottom: 18px;
  }

  .module-access-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .access-full     { background: rgba(0,74,173,0.1);  color: var(--blue-dark); }
  .access-validacion { background: rgba(245,158,11,0.1); color: #d97706; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--navy);
    color: white;
    padding: 14px 20px;
    border-radius: 12px;
    font-size: 0.88rem;
    font-weight: 500;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    z-index: 300;
    display: none;
    align-items: center;
    gap: 10px;
    animation: slideToast 0.3s ease;
  }

  @keyframes slideToast {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* ── LOADING SKELETON ── */
  .skeleton {
    background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-200) 50%, var(--gray-100) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 8px;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
</style>
</head>

// ─── INIT ───
let currentUser = null;

document.addEventListener('DOMContentLoaded', async () => {
  const stored = sessionStorage.getItem('zidkenu_user');
  if (!stored) { window.location.href = 'login.html'; return; }
  currentUser = JSON.parse(stored);

  if (!rolConfig[currentUser.rol]) {
    showToast('⚠️ Rol no reconocido. Redirigiendo...');
    setTimeout(() => logout(), 2000);
    return;
  }

  setDate();
  buildSidebar(currentUser);
  buildWelcome(currentUser);
  await loadStats(currentUser);
  buildModules(currentUser);
});

function setDate() {
  const now = new Date();
  document.getElementById('currentDate').textContent =
    now.toLocaleDateString('es-PE', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
}

function buildSidebar(user) {
  const cfg = rolConfig[user.rol];
  const initials = user.nombre.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  const av = document.getElementById('sidebarAvatar');
  av.textContent = initials;
  av.style.background = cfg.gradientAvatar;

  document.getElementById('sidebarName').textContent = user.nombre;
  const rb = document.getElementById('sidebarRoleBadge');
  rb.textContent = rolLabels[user.rol] || user.rol;
  rb.style.background = cfg.badgeBg;
  rb.style.color = cfg.badgeColor;

  const navItems = cfg.nav(user.rol);
  document.getElementById('sidebarNav').innerHTML = navItems.map(item => {
    if (item.section) return `<div class="nav-section-label">${item.section}</div>`;
    return `<a class="nav-item ${item.active ? 'active' : ''}" href="${item.href}">
      ${item.icon}
      ${item.label}
    </a>`;
  }).join('');
}

function buildWelcome(user) {
  const cfg = rolConfig[user.rol];
  document.getElementById('welcomeRoleLine').textContent = cfg.welcomeRol;
  document.getElementById('welcomeName').textContent = `Bienvenido, ${user.nombre.split(' ')[0]}`;
  document.getElementById('welcomeSubtitle').textContent = cfg.subtitle;
  document.getElementById('pageTitle').textContent = cfg.welcomeRol;
  document.getElementById('pageSubtitle').textContent = `Sesión activa · ${rolLabels[user.rol]}`;
}

async function loadStats(user) {
  const cfg = rolConfig[user.rol];
  const statsRow = document.getElementById('statsRow');

  statsRow.innerHTML = cfg.statsKeys.map(() => `
    <div class="stat-card">
      <div class="skeleton" style="height:14px;width:60%;margin-bottom:10px"></div>
      <div class="skeleton" style="height:36px;width:50%;margin-bottom:6px"></div>
      <div class="skeleton" style="height:12px;width:70%"></div>
    </div>
  `).join('');

  try {
    let stats = {};
    const isUserRole = ['usuario', 'contador', 'supervisor'].includes(user.rol);
    let endpoint = `${API_URL}?action=stats`;
    if (isUserRole && user.id) {
      endpoint = `${API_URL}?action=stats_usuario&usuario_id=${user.id}`;
    }

    const res = await fetch(endpoint);
    if (res.ok) {
      stats = await res.json();
    }

    renderStats(cfg, stats);
  } catch (e) {
    renderStats(cfg, {
      pendientes: '—', completadas: '—', en_progreso: '—',
      total_usuarios: '—', total_empresas: '—', modulos_activos: 2,
      tareas_completadas: '—', cumplimiento: '—'
    });
  }
}

function renderStats(cfg, stats) {
  const statsRow = document.getElementById('statsRow');
  const suffixes = { cumplimiento: '%' };

  statsRow.innerHTML = cfg.statsKeys.map((key, i) => {
    const val = stats[key] !== undefined ? stats[key] : '—';
    const suffix = suffixes[key] || '';
    const isUp = key === 'tareas_completadas' || key === 'cumplimiento';
    return `
      <div class="stat-card">
        <div class="stat-label">${cfg.statsLabels[i]}</div>
        <div class="stat-value">${val}${val !== '—' && suffix ? suffix : ''}</div>
        <div class="stat-change ${isUp ? 'up' : 'neutral'}">${isUp ? '↑ Al día' : 'Actual'}</div>
      </div>
    `;
  }).join('');
}

function buildModules(user) {
  const cfg = rolConfig[user.rol];
  const grid = document.getElementById('modulesGrid');
  grid.innerHTML = cfg.modules.map(m => {
    let labelClass = 'access-full';
    let labelIcon  = '✅';
    if (m.type === 'validacion') {
      labelClass = 'access-validacion';
      labelIcon  = '🔍';
    }
    return `
      <a class="module-card" href="${m.href}">
        <div class="module-icon-wrap" style="background:${m.iconBg}">${m.icon}</div>
        <div class="module-title">${m.title}</div>
        <div class="module-desc">${m.desc}</div>
        <span class="module-access-label ${labelClass}">
          ${labelIcon} ${m.access}
        </span>
      </a>
    `;
  }).join('');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.style.display = 'flex';
  setTimeout(() => { t.style.display = 'none'; }, 3000);
}

function logout() {
  if (confirm('¿Cerrar sesión?')) {
    sessionStorage.removeItem('zidkenu_user');
    window.location.href = 'login.html';
  }
}
